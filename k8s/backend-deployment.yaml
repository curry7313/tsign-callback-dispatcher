apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsign-dispatcher-backend
  namespace: default
  labels:
    app: tsign-dispatcher
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tsign-dispatcher
      component: backend
  template:
    metadata:
      labels:
        app: tsign-dispatcher
        component: backend
    spec:
      containers:
        - name: backend
          image: tsign-dispatcher-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: logs
              mountPath: /app/logs
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: tsign-dispatcher-config
        - name: logs
          emptyDir: {}
