apiVersion: v1
kind: Secret
metadata:
  name: tsign-dispatcher-secret
  namespace: default
  labels:
    app: tsign-dispatcher
type: Opaque
# NOTE: Replace these values with base64-encoded strings before applying:
#   echo -n "your-jwt-secret-here" | base64
#   echo -n "your-admin-password" | base64
stringData:
  JWT_SECRET: "please-change-this-secret-in-production"
  ADMIN_DEFAULT_PASSWORD: "admin123"
