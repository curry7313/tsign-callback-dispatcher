apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tsign-dispatcher-backend-policy
  namespace: default
  labels:
    app: tsign-dispatcher
spec:
  podSelector:
    matchLabels:
      app: tsign-dispatcher
      component: backend
  policyTypes:
    - Ingress
  ingress:
    # Only allow traffic from frontend pods (nginx)
    - from:
        - podSelector:
            matchLabels:
              app: tsign-dispatcher
              component: frontend
      ports:
        - protocol: TCP
          port: 3001
