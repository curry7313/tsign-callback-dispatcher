apiVersion: apps/v1
kind: Deployment
metadata:
  name: tsign-dispatcher-frontend
  namespace: default
  labels:
    app: tsign-dispatcher
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tsign-dispatcher
      component: frontend
  template:
    metadata:
      labels:
        app: tsign-dispatcher
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ccr.ccs.tencentyun.com/pulse-line-prod/tsign-dispatcher-frontend:latest
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
