# 性能测试环境
# 包含: dispatcher (被测服务) + InfluxDB (K6 指标存储) + Grafana (可视化)
#
# 用法:
#   ./perf-test.sh up       # 启动所有基础设施
#   ./perf-test.sh run      # 运行 K6 负载测试
#   ./perf-test.sh dash     # 打开 Grafana 面板
#   ./perf-test.sh down     # 关闭所有服务

services:
  # ──── 被测服务: Dispatcher ────
  dispatcher:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.backend
    container_name: perf-dispatcher
    restart: "no"
    ports:
      - "5001:3001"
    volumes:
      - ./config/dispatcher:/app/config
      - ./logs/dispatcher:/app/logs
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=warn
    networks:
      - perf-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ──── 下游接收者 B (被分发目标) ────
  receiver-b:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.backend
    container_name: perf-receiver-b
    restart: "no"
    ports:
      - "5002:3001"
    volumes:
      - ./config/receiver-b:/app/config
      - ./logs/receiver-b:/app/logs
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=warn
    networks:
      - perf-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ──── 下游接收者 C (被分发目标) ────
  receiver-c:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.backend
    container_name: perf-receiver-c
    restart: "no"
    ports:
      - "5003:3001"
    volumes:
      - ./config/receiver-c:/app/config
      - ./logs/receiver-c:/app/logs
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=warn
    networks:
      - perf-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ──── InfluxDB: K6 指标存储 ────
  influxdb:
    image: influxdb:1.8
    container_name: perf-influxdb
    restart: "no"
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_MAX_BODY_SIZE=0
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - perf-net
    healthcheck:
      test: ["CMD", "influx", "-execute", "SHOW DATABASES"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ──── Grafana: 可视化面板 ────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: perf-grafana
    restart: "no"
    ports:
      - "3030:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/k6-dashboard.json
    volumes:
      - ./k6/grafana/provisioning:/etc/grafana/provisioning
      - ./k6/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - perf-net

networks:
  perf-net:
    driver: bridge

volumes:
  influxdb-data:
  grafana-data:
